services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-runa}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # ports:
    #   - "${DB_PORT:-5432}:5432"

  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-auth}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    image: ghcr.io/omnidotdev/gatekeeper-app:latest
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD}@auth-db:5432/${AUTH_DB_NAME:-auth}
      VITE_APP_URL: ${AUTH_BASE_URL:-http://localhost:3001}
      VITE_BASE_URL: ${AUTH_BASE_URL:-http://localhost:3001}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      TRUSTED_DOMAIN: ${TRUSTED_DOMAIN:-localhost}
      SENDER_EMAIL_ADDRESS: ${SENDER_EMAIL_ADDRESS:-noreply@localhost}
      ENABLE_BREACH_CHECK: ${ENABLE_BREACH_CHECK:-false}
      # Override build-time Vite values that assume cloud infrastructure
      VITE_FLAGS_API_HOST: ""
      # Auto-seed OAuth client for self-hosted (reads by seedOAuthClient.mjs on boot)
      DEFAULT_CLIENT_ID: ${AUTH_CLIENT_ID:?AUTH_CLIENT_ID is required}
      DEFAULT_CLIENT_SECRET: ${AUTH_CLIENT_SECRET:?AUTH_CLIENT_SECRET is required}
      DEFAULT_CLIENT_REDIRECT_URIS: ${BASE_URL:-http://localhost}/api/auth/oauth2/callback/omni
    depends_on:
      auth-db:
        condition: service_healthy

  api:
    image: ghcr.io/omnidotdev/runa-api:latest
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-runa}
      PORT: "4000"
      HOST: "0.0.0.0"
      NODE_ENV: production
      CORS_ALLOWED_ORIGINS: ${BASE_URL:-http://localhost}
      AUTH_BASE_URL: ${AUTH_BASE_URL:-http://localhost:3001}
      AUTHZ_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:4000/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  app:
    image: ghcr.io/omnidotdev/runa-app:latest
    extra_hosts:
      - "localhost:host-gateway"
    environment:
      NODE_ENV: production
      # Skip TLS verification for internal calls to Caddy (mkcert CA not in container)
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      BASE_URL: ${BASE_URL:-http://localhost}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:4000}
      API_INTERNAL_URL: http://api:4000
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-runa}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      AUTH_BASE_URL: ${AUTH_BASE_URL:-http://localhost:3001}
      AUTH_INTERNAL_URL: http://auth:3000
      AUTH_CLIENT_ID: ${AUTH_CLIENT_ID:?AUTH_CLIENT_ID is required}
      AUTH_CLIENT_SECRET: ${AUTH_CLIENT_SECRET:?AUTH_CLIENT_SECRET is required}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
      auth:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    ports:
      - "${APP_PORT_MAP:-80:80}"
      - "${AUTH_PORT:-3001}:3001"
      - "${API_PORT:-4000}:4000"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./.certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - api
      - auth

volumes:
  db_data:
  auth_db_data:
  caddy_data:
  caddy_config:
